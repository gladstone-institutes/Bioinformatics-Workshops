  <text x="120" y="167" text-anchor="middle"
        font-family="Helvetica, sans-serif" font-size="13" fill="#334155">retains context across steps</text>

  <!-- LEFT MIDDLE: Reactivity (eye) at icon center (120, 220), viewBox 576x512, scale 0.09 -->
