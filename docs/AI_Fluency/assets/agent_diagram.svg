  <text x="780" y="407" text-anchor="middle"
        font-family="Helvetica, sans-serif" font-size="13" fill="#334155">human stays in the loop</text>

  <!-- ============ SPOKE LINES ============
       Double-ended arrows (marker-start + marker-end both use the same
       auto-start-reverse marker, so the tip aligns to each line endpoint).
       Hub-side endpoints are inset 15px from the hub card edges (card x=[370,530])
       so the lines never touch the hub box. -->

  <!-- Left spokes: hub-side at x=355, icon-side at x=170 -->
  <line x1="355" y1="175" x2="170" y2="115" stroke="#94a3b8" stroke-width="1.5"
        marker-start="url(#spoke-arrow)" marker-end="url(#spoke-arrow)"/>
  <line x1="355" y1="220" x2="170" y2="220" stroke="#94a3b8" stroke-width="1.5"
        marker-start="url(#spoke-arrow)" marker-end="url(#spoke-arrow)"/>
  <line x1="355" y1="265" x2="170" y2="325" stroke="#94a3b8" stroke-width="1.5"
        marker-start="url(#spoke-arrow)" marker-end="url(#spoke-arrow)"/>

  <!-- Right spokes: hub-side at x=545, icon-side at x=730 -->
  <line x1="545" y1="175" x2="730" y2="115" stroke="#94a3b8" stroke-width="1.5"
        marker-start="url(#spoke-arrow)" marker-end="url(#spoke-arrow)"/>
  <line x1="545" y1="220" x2="730" y2="220" stroke="#94a3b8" stroke-width="1.5"
