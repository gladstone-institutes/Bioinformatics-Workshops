  <text x="780" y="150" text-anchor="middle"
        font-family="Helvetica, sans-serif" font-size="14" font-weight="600" fill="#1e293b">Autonomy</text>
  <text x="780" y="167" text-anchor="middle"
        font-family="Helvetica, sans-serif" font-size="13" fill="#334155">chooses its own next step</text>

  <!-- RIGHT MIDDLE: Delegation (sitemap - tree of nodes, reads as sub-agents not people)
