  <text x="780" y="287" text-anchor="middle"
        font-family="Helvetica, sans-serif" font-size="13" fill="#334155">spawns other agents</text>

  <!-- RIGHT BOTTOM: Human Oversight (user-check) at icon center (780, 340), viewBox 640x512 -->
