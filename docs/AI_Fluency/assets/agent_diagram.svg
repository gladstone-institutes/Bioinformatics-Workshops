<svg xmlns="http://www.w3.org/2000/svg" width="900" height="440" viewBox="0 0 900 440">
  <defs>
    <!-- Arrow marker: tip at refX=10 so it aligns exactly to the line endpoint.
         orient="auto-start-reverse" lets the same marker work for both marker-start and marker-end. -->
    <marker id="spoke-arrow" viewBox="0 0 10 10" refX="10" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="900" height="440" fill="white"/>

  <!-- HUB card centered at (450, 220) -->
  <rect x="370" y="140" width="160" height="160" rx="20" ry="20"
        fill="#e2e8f0" stroke="#475569" stroke-width="2.5"/>

